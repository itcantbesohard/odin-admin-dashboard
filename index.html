<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
    <title>Admin Dashboard</title>
</head>

<body>
    <div class="app">

        <aside class="sidebar">
            <div class="logo">Dashboard</div>
            <nav class="menu">
                <ul>
                    <li>
                        <span class="icon"></span>
                        <span class="text">Home</span>
                    </li>
                    <li>
                        <span class="icon"></span>
                        <span class="text">Profile</span>
                    </li>
                    <li>
                        <span class="icon"></span>
                        <span class="text">Messages</span>
                    </li>
                    <li class="separator"></li>
                </ul>

            </nav>

        </aside>

        <header class="topbar">
            <div class="search">
                <span class="icon"></span>
                <input type="text">
            </div>
            <div class="user">
                <span class="icon"></span>
                <img class="avatar" src="" alt="avatar">
                <span class="username">Morgan Oakley</span>
            </div>
            <div class="user-info">
                <img class="avatar" src="" alt="avatar">
                <p>Hi there</p>
                <span class="username">Morgan Oakley (@morgan)</span>
            </div>
        </header>

        <main class="main">
            <section class="content">
                <div class="projects">
                    <div class="card">
                        <h3>Super Cool Project</h3>
                        <p>
                            Sed tempus ut lacus ut scelerisque.
                            Suspendisse sollicitudin nibh erat, id facilisis felis accumsan nec.
                        </p>
                        <div class="card-actions">
                            <button>⭐</button>
                            <button>👁</button>
                            <button>🔗</button>
                        </div>
                    </div>
                </div>
                <div class="announcements"></div>
                <div class="trending"></div>
            </section>
        </main>
    </div>
</body>

</html>
